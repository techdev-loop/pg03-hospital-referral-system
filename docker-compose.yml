services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: referrals-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://localhost:5432/referrals}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: referrals-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
